<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>語音憂鬱檢測系統（PHQ-8 分數）</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background-color: #0e0e0e;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      background-image: radial-gradient(circle at top left, #1e1e1e, #000);
    }
    h1 { text-align: center; margin-bottom: 20px; font-size: 28px; letter-spacing: 2px; }
    .section { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 30px; width: 90%; max-width: 700px; margin-bottom: 20px; }
    input[type="file"], button { border-radius: 6px; padding: 6px 12px; border: none; cursor: pointer; }
    button { background-color: #3498db; color: #fff; transition: 0.2s; }
    button:hover { background-color: #2980b9; transform: scale(1.03); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    audio { width: 100%; margin-top: 10px; border-radius: 6px; }
    .result-box { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 15px; text-align: center; margin-top: 15px; }
    .result-title { color: #66b3ff; font-weight: bold; margin-bottom: 6px; }
    .result-text { font-size: 20px; font-weight: bold; color: #fff; min-height: 28px; }
    .loading-overlay { position: fixed; inset:0; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.45); z-index:9999; }
    .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #66b3ff; border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>語音憂鬱檢測系統（PHQ-8 分數）</h1>

  <div class="section">
    <h2>使用預先錄製的音訊</h2>
    <input type="file" id="audioFile" accept="audio/*">
    <button id="uploadFileBtn">上傳並預測</button>
    <audio id="previewAudio" controls></audio>
  </div>

  <div class="section">
    <h2>立刻錄音檢測</h2>
    <button id="startRecord">開始錄音</button>
    <button id="stopRecord" disabled>停止錄音</button>
    <button id="uploadRecord" disabled>上傳並預測</button>
    <audio id="recordedAudio" controls></audio>
  </div>

  <div class="section result-box">
    <div class="result-title">PHQ-8 分數</div>
    <div id="regressionResult" class="result-text">尚無結果</div>
  </div>

  <div class="section result-box">
    <div class="result-title">建議</div>
    <div id="adviceText" class="result-text">尚無結果</div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script>
    const backendUrl = "https://depressionmodel-ai.onrender.com/predict";
    const fileInput = document.getElementById("audioFile");
    const previewAudio = document.getElementById("previewAudio");
    const uploadFileBtn = document.getElementById("uploadFileBtn");
    const startBtn = document.getElementById("startRecord");
    const stopBtn = document.getElementById("stopRecord");
    const uploadRecordBtn = document.getElementById("uploadRecord");
    const recordedAudio = document.getElementById("recordedAudio");
    const regressionResult = document.getElementById("regressionResult");
    const adviceText = document.getElementById("adviceText");
    const loadingOverlay = document.getElementById("loadingOverlay");

    let mediaRecorder, recordedChunks = [];

    function setLoading(isLoading) {
      loadingOverlay.style.display = isLoading ? "flex" : "none";
      uploadFileBtn.disabled = isLoading;
      uploadRecordBtn.disabled = isLoading || !recordedAudio.src;
      fileInput.disabled = isLoading;
      startBtn.disabled = isLoading;
      stopBtn.disabled = isLoading || stopBtn.disabled;
    }

    function getAdviceByScore(score) {
      if (score <= 4) return "身心健康--太好了，快去找點事做吧~";
      if (score <= 9) return "輕度憂鬱，試著讓自己放鬆，轉換心情。";
      if (score <= 14) return "中度憂鬱，給自己喘息時間，散步或與信任的人聊聊。";
      if (score <= 19) return "中重度憂鬱，把焦點放在能帶來快樂的事上。";
      return "重度憂鬱，請尋求專業心理師的協助。";
    }

    function displayResults(data) {
      if (!data || data.phq8_score === undefined) {
        regressionResult.textContent = "⚠️ 無回傳資料";
        adviceText.textContent = "";
        return;
      }
      const score = data.phq8_score;
      regressionResult.textContent = score;
      adviceText.textContent = getAdviceByScore(score);
    }

    async function uploadAudio(file) {
      const formData = new FormData();
      formData.append("file", file);
      setLoading(true);
      regressionResult.textContent = "⏳ 預測中…";
      try {
        const res = await fetch(backendUrl, { method: "POST", body: formData });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        displayResults(data);
      } catch (err) {
        regressionResult.textContent = "⚠️ 上傳或網路錯誤";
        console.error(err);
      } finally {
        setLoading(false);
      }
    }

    // 檔案上傳
    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      previewAudio.src = file ? URL.createObjectURL(file) : "";
    });

    uploadFileBtn.addEventListener("click", () => {
      const file = fileInput.files[0];
      if (!file) return alert("請先選擇音訊檔案！");
      uploadAudio(file);
    });

    // 錄音
    startBtn.addEventListener("click", async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: "audio/wav" });
          recordedAudio.src = URL.createObjectURL(blob);
          uploadRecordBtn.disabled = false;
        };
        mediaRecorder.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
        regressionResult.textContent = "🎙️ 錄音中…";
      } catch (err) {
        alert("無法取得麥克風權限或裝置不支援。");
        console.error(err);
      }
    });

    stopBtn.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
      startBtn.disabled = false;
      stopBtn.disabled = true;
      regressionResult.textContent = "✅ 錄音完成，可上傳";
    });

    uploadRecordBtn.addEventListener("click", () => {
      if (!recordedChunks.length) return alert("請先錄音再上傳。");
      const blob = new Blob(recordedChunks, { type: "audio/wav" });
      uploadAudio(blob);
    });
  </script>
</body>
</html>
